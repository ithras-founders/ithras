<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-url" content="/api">
    <script>window.API_URL = '/api';</script>
    <title>Ithras | Enterprise Placement Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="/public/tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
          --app-bg: #f5f5f7;
          --app-bg-elevated: #ffffff;
          --app-surface: #ffffff;
          --app-surface-muted: #fafafa;
          --app-text-primary: #1d1d1f;
          --app-text-secondary: #6e6e73;
          --app-text-muted: #86868b;
          --app-border-soft: rgba(0, 0, 0, 0.06);
          --app-border-strong: rgba(0, 0, 0, 0.1);
          --app-accent: #0071e3;
          --app-accent-hover: #0077ed;
          --app-accent-soft: rgba(0, 113, 227, 0.08);
          --app-danger: #ff3b30;
          --app-success: #34c759;
          --app-radius-sm: 8px;
          --app-radius-md: 12px;
          --app-radius-lg: 16px;
          --app-shadow-subtle: 0 1px 3px rgba(0, 0, 0, 0.04);
          --app-shadow-card: 0 2px 12px rgba(0, 0, 0, 0.04);
          --app-shadow-floating: 0 8px 32px rgba(0, 0, 0, 0.08);
          --app-transition-fast: 180ms cubic-bezier(0.25, 0.1, 0.25, 1);
          --app-transition-base: 250ms cubic-bezier(0.25, 0.1, 0.25, 1);
        }
        * { box-sizing: border-box; }
        body {
          margin: 0;
          font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
          -webkit-font-smoothing: antialiased;
          -moz-osx-font-smoothing: grayscale;
          background: var(--app-bg);
          color: var(--app-text-primary);
          font-size: 15px;
          line-height: 1.47;
          letter-spacing: -0.01em;
        }
        .app-focus-ring:focus-visible {
          outline: 2px solid var(--app-accent);
          outline-offset: 2px;
        }
        .app-card {
          background: var(--app-surface);
          border: 1px solid var(--app-border-soft);
          border-radius: var(--app-radius-md);
          box-shadow: var(--app-shadow-subtle);
        }
        .app-input {
          background: var(--app-surface);
          color: var(--app-text-primary);
          border: 1px solid var(--app-border-strong);
          border-radius: var(--app-radius-sm);
          transition: border-color var(--app-transition-fast), box-shadow var(--app-transition-fast);
        }
        .app-input:focus {
          border-color: var(--app-accent);
          box-shadow: 0 0 0 3px var(--app-accent-soft);
          outline: none;
        }
        .app-button-primary,
        .app-button-secondary,
        .app-button-ghost {
          border-radius: var(--app-radius-sm);
          border: none;
          transition: all var(--app-transition-fast);
          font-weight: 500;
          font-size: 15px;
        }
        .app-button-primary {
          background: var(--app-accent);
          color: #ffffff;
        }
        .app-button-primary:hover {
          background: var(--app-accent-hover);
        }
        .app-button-secondary {
          background: var(--app-surface);
          color: var(--app-text-primary);
          border: 1px solid var(--app-border-strong);
        }
        .app-button-secondary:hover {
          background: var(--app-surface-muted);
        }
        .app-button-ghost {
          background: transparent;
          color: var(--app-accent);
        }
        .app-button-ghost:hover {
          background: var(--app-accent-soft);
        }
        .glass-panel {
          background: rgba(255, 255, 255, 0.92);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid var(--app-border-soft);
          border-radius: var(--app-radius-md);
        }
        .sidebar-item-active {
          background: var(--app-accent-soft);
          color: var(--app-accent);
        }
        .app-shell-bg {
          background: var(--app-bg);
        }
        .app-sidebar-surface {
          background: var(--app-surface);
          border-right: 1px solid var(--app-border-soft);
        }
        .app-shell-main {
          background: transparent;
          min-height: 100%;
        }
        .app-divider {
          height: 1px;
          background: var(--app-border-soft);
        }
        .custom-scrollbar::-webkit-scrollbar {
          width: 8px;
          height: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
          background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
          background: rgba(0, 0, 0, 0.15);
          border-radius: 999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
          background: rgba(0, 0, 0, 0.25);
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(4px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
          animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
