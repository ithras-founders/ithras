<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="api-url" content="/api">
    <script>window.API_URL = '/api';</script>
    <title>Ithras | Enterprise Placement Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/core/frontend/src/modules/shared/styles/tokens.css">
    <link rel="stylesheet" href="/core/frontend/src/modules/shared/styles/base.css">
    <style>
        .app-button-primary,
        .app-button-secondary,
        .app-button-ghost {
          border-radius: var(--app-radius-sm);
          border: none;
          transition: all var(--app-transition-fast);
          font-weight: 500;
          font-size: 15px;
        }
        .app-button-primary {
          background: var(--app-accent);
          color: #ffffff;
        }
        .app-button-primary:hover {
          background: var(--app-accent-hover);
        }
        .app-button-secondary {
          background: var(--app-surface);
          color: var(--app-text-primary);
          border: 1px solid var(--app-border-strong);
        }
        .app-button-secondary:hover {
          background: var(--app-surface-muted);
        }
        .app-button-ghost {
          background: transparent;
          color: var(--app-accent);
        }
        .app-button-ghost:hover {
          background: var(--app-accent-soft);
        }
        .glass-panel {
          background: rgba(255, 255, 255, 0.92);
          backdrop-filter: blur(20px);
          -webkit-backdrop-filter: blur(20px);
          border: 1px solid var(--app-border-soft);
          border-radius: var(--app-radius-md);
        }
        .sidebar-item-active {
          background: var(--app-accent-soft);
          color: var(--app-accent);
        }
        .app-shell-bg {
          background: var(--app-bg);
        }
        .app-sidebar-surface {
          background: var(--app-surface);
          border-right: 1px solid var(--app-border-soft);
        }
        .app-shell-main {
          background: transparent;
          min-height: 100%;
        }
        .app-divider {
          height: 1px;
          background: var(--app-border-soft);
        }
        @keyframes fadeIn {
          from { opacity: 0; transform: translateY(4px); }
          to { opacity: 1; transform: translateY(0); }
        }
        .animate-in {
          animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden">
    <div id="root"></div>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
