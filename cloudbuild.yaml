# Cloud Build pipeline — Ithras full deployment (backend + frontend)
#
# Required substitutions (set in Cloud Build trigger or --substitutions flag):
#   _PROJECT_ID        GCP project ID                    e.g. my-gcp-project
#   _REGION            Cloud Run / Artifact Registry     e.g. europe-west1
#   _CLOUD_SQL_INSTANCE  Full instance connection name   e.g. my-project:europe-west1:ithras-db
#   _DATABASE_URL      Full postgresql:// connection URL (Cloud SQL socket form preferred)
#                      e.g. postgresql://ithras:PASSWORD@/placement_db?host=/cloudsql/my-project:europe-west1:ithras-db
#   _JWT_SECRET        Secret for signing JWTs
#   _GEMINI_API_KEY    Google AI API key
#
# Optional substitutions (have sensible defaults):
#   _BACKEND_SERVICE   Cloud Run service name for backend   (default: ithras-backend)
#   _FRONTEND_SERVICE  Cloud Run service name for frontend  (default: ithras-frontend)
#   _REGISTRY          Artifact Registry repo              (default: cloud-run-source-deploy/ithras)
#   _REDIS_URL         Redis connection string             (default: empty)
#   _DEMO_PASSWORD     Seeded demo account password        (default: password)
#   _BACKEND_URL       Public backend URL for nginx proxy  (default: auto-detected after deploy)
#   _MIN_INSTANCES     Min instances (prevents cold starts) (default: 0)
#   _MAX_INSTANCES     Max instances                        (default: 10)
#   _SERVICE_ACCOUNT   Cloud Run service account email     (default: empty — uses Compute default)
#   _DB_SETUP          Run Alembic/seeds on startup         (default: TRUE; set FALSE after DB is migrated to speed cold starts)

substitutions:
  _REGION: asia-south1
  _BACKEND_SERVICE: ithras-backend
  _FRONTEND_SERVICE: ithras-frontend
  _REGISTRY: cloud-run-source-deploy/ithras
  _REDIS_URL: ''
  _DEMO_PASSWORD: 'password'
  _BACKEND_URL: ''
  _MIN_INSTANCES: '0'
  _MAX_INSTANCES: '10'
  _SERVICE_ACCOUNT: ''
  _DB_SETUP: 'TRUE'

steps:

  # ── Validate required substitutions ──────────────────────────────────────────
  - id: validate
    name: 'bash'
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        [ -z "$_DATABASE_URL" ]    && echo "ERROR: _DATABASE_URL is required"    && exit 1
        [ -z "$_JWT_SECRET" ]      && echo "ERROR: _JWT_SECRET is required"      && exit 1
        [ -z "$_GEMINI_API_KEY" ]  && echo "ERROR: _GEMINI_API_KEY is required"  && exit 1
        [ -z "$_CLOUD_SQL_INSTANCE" ] && echo "ERROR: _CLOUD_SQL_INSTANCE is required" && exit 1
        echo "Substitution validation passed"

  # ── Build backend image ───────────────────────────────────────────────────────
  - id: build-backend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: [validate]
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        # COMMIT_SHA is often "" (not unset) for `gcloud builds submit`; empty must fall back to BUILD_ID
        TAG="$${COMMIT_SHA}"
        [ -z "$$TAG" ] && TAG="$${BUILD_ID}"
        [ -z "$$TAG" ] && TAG="latest"
        IMAGE_BASE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY}/${_BACKEND_SERVICE}"
        CACHE_ARGS=()
        if docker pull "$${IMAGE_BASE}:latest"; then
          CACHE_ARGS+=(--cache-from "$${IMAGE_BASE}:latest")
        else
          echo "No remote cache available for $${IMAGE_BASE}:latest; continuing without cache"
        fi
        echo "Building backend image: $${IMAGE_BASE}:$${TAG}"
        docker build "${CACHE_ARGS[@]}" \
          -t "$${IMAGE_BASE}:$${TAG}" \
          -t "$${IMAGE_BASE}:latest" \
          -f Dockerfile.backend \
          .

  # ── Build frontend image ──────────────────────────────────────────────────────
  - id: build-frontend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: [validate]
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        TAG="$${COMMIT_SHA}"
        [ -z "$$TAG" ] && TAG="$${BUILD_ID}"
        [ -z "$$TAG" ] && TAG="latest"
        IMAGE_BASE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY}/${_FRONTEND_SERVICE}"
        # Never use --cache-from for the frontend. If ithras-frontend:latest was ever wrongly
        # tagged as the backend image, remote cache poisons every build (Uvicorn on ithras-frontend).
        echo "Building frontend image (no remote cache-from): $${IMAGE_BASE}:$${TAG}"
        docker build --pull \
          -t "$${IMAGE_BASE}:$${TAG}" \
          -t "$${IMAGE_BASE}:latest" \
          -f Dockerfile.frontend \
          .
        echo "Verifying image is nginx frontend, not Python backend..."
        docker run --rm --entrypoint sh "$${IMAGE_BASE}:$${TAG}" -c '\
          if [ -f /app/main.py ]; then echo "ERROR: /app/main.py present — this is the backend image, not Dockerfile.frontend"; exit 1; fi; \
          if command -v uvicorn >/dev/null 2>&1; then echo "ERROR: uvicorn found — backend image"; exit 1; fi; \
          nginx -v || { echo "ERROR: nginx missing"; exit 1; }; \
          echo "OK: frontend image sanity check passed"'

  # ── Push backend image ────────────────────────────────────────────────────────
  - id: push-backend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: [build-backend]
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY}/${_BACKEND_SERVICE}'

  # ── Push frontend image ───────────────────────────────────────────────────────
  - id: push-frontend
    name: 'gcr.io/cloud-builders/docker'
    waitFor: [build-frontend]
    args:
      - 'push'
      - '--all-tags'
      - '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY}/${_FRONTEND_SERVICE}'

  # ── Deploy backend to Cloud Run ───────────────────────────────────────────────
  - id: deploy-backend
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    waitFor: [push-backend]
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        TAG="$${COMMIT_SHA}"
        [ -z "$$TAG" ] && TAG="$${BUILD_ID}"
        [ -z "$$TAG" ] && TAG="latest"
        BACK_BASE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY}/${_BACKEND_SERVICE}"
        BACK_DIGEST=$$(gcloud artifacts docker images describe "$${BACK_BASE}:$$TAG" \
          --format='value(image_summary.digest)')
        [ -n "$$BACK_DIGEST" ] || { echo "ERROR: Could not resolve backend image digest for $${BACK_BASE}:$$TAG"; exit 1; }
        BACK_IMAGE="$${BACK_BASE}@$$BACK_DIGEST"
        case "$$BACK_IMAGE" in */"${_BACKEND_SERVICE}"@*) ;; *)
          echo "ERROR: Backend deploy image path must contain /${_BACKEND_SERVICE}@ (got: $$BACK_IMAGE)"
          exit 1
          ;;
        esac
        echo "Deploying ${_BACKEND_SERVICE} with digest-pinned image: $$BACK_IMAGE"
        ARGS=(
          run deploy "${_BACKEND_SERVICE}"
          --image "$$BACK_IMAGE"
          --region "${_REGION}"
          --platform managed
          --allow-unauthenticated
          --port 8080
          --add-cloudsql-instances "${_CLOUD_SQL_INSTANCE}"
          --min-instances "${_MIN_INSTANCES}"
          --max-instances "${_MAX_INSTANCES}"
          --cpu 1
          --memory 1Gi
          --cpu-boost
          --no-cpu-throttling
          --startup-probe=initialDelaySeconds=10,timeoutSeconds=5,periodSeconds=10,failureThreshold=24,tcpSocket.port=8080
          --set-env-vars "DATABASE_URL=${_DATABASE_URL},JWT_SECRET=${_JWT_SECRET},GEMINI_API_KEY=${_GEMINI_API_KEY},REDIS_URL=${_REDIS_URL},REQUIRE_DATABASE=true,DB_SETUP=${_DB_SETUP},DEMO_PASSWORD=${_DEMO_PASSWORD},LOG_FORMAT=json,UPLOAD_DIR=/app/uploads"
        )
        if [ -n "${_SERVICE_ACCOUNT}" ]; then
          ARGS+=(--service-account "${_SERVICE_ACCOUNT}")
        fi
        gcloud "${ARGS[@]}"

  # ── Resolve backend URL and deploy frontend ───────────────────────────────────
  - id: deploy-frontend
    name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    waitFor: [push-frontend, deploy-backend]
    entrypoint: bash
    args:
      - '-c'
      - |
        set -e
        TAG="$${COMMIT_SHA}"
        [ -z "$$TAG" ] && TAG="$${BUILD_ID}"
        [ -z "$$TAG" ] && TAG="latest"
        # Use provided _BACKEND_URL or look it up from the deployed backend service
        if [ -n "${_BACKEND_URL}" ]; then
          BACKEND_URL="${_BACKEND_URL}"
        else
          BACKEND_URL=$$(gcloud run services describe "${_BACKEND_SERVICE}" \
            --region "${_REGION}" \
            --format "value(status.url)")
          echo "Auto-detected backend URL: $$BACKEND_URL"
        fi

        FRONT_BASE="${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REGISTRY}/${_FRONTEND_SERVICE}"
        FRONT_DIGEST=$$(gcloud artifacts docker images describe "$${FRONT_BASE}:$$TAG" \
          --format='value(image_summary.digest)')
        [ -n "$$FRONT_DIGEST" ] || { echo "ERROR: Could not resolve frontend image digest for $${FRONT_BASE}:$$TAG"; exit 1; }
        FRONT_IMAGE="$${FRONT_BASE}@$$FRONT_DIGEST"
        case "$$FRONT_IMAGE" in */"${_FRONTEND_SERVICE}"@*) ;; *)
          echo "ERROR: Frontend deploy image path must contain /${_FRONTEND_SERVICE}@ (got: $$FRONT_IMAGE)"
          exit 1
          ;;
        esac
        case "$$FRONT_IMAGE" in */"${_BACKEND_SERVICE}"@*)
          echo "ERROR: Refusing to deploy ${_FRONTEND_SERVICE} with ${_BACKEND_SERVICE} image path (got: $$FRONT_IMAGE)"
          exit 1
          ;;
        esac
        echo "Deploying ${_FRONTEND_SERVICE} with digest-pinned image: $$FRONT_IMAGE"

        ARGS=(
          run deploy "${_FRONTEND_SERVICE}"
          --image "$$FRONT_IMAGE"
          --region "${_REGION}"
          --platform managed
          --allow-unauthenticated
          --port 8080
          --set-env-vars "BACKEND_URL=$${BACKEND_URL}"
        )
        if [ -n "${_SERVICE_ACCOUNT}" ]; then
          ARGS+=(--service-account "${_SERVICE_ACCOUNT}")
        fi
        gcloud "${ARGS[@]}"

# Do NOT list `images:` here. This pipeline already pushes both images in push-backend /
# push-frontend. A global `images:` block advertises multiple artifacts to Cloud Build;
# if your trigger also uses "Deploy to Cloud Run" and picks the *first* image only, it
# can deploy ithras-backend's image to ithras-frontend (Uvicorn + ModuleNotFoundError).
# Deployments are handled entirely by the deploy-backend / deploy-frontend steps above.
# Those steps pin images by digest (@sha256:...) and assert the frontend image path is not
# the backend repository. Disable any second "Deploy to Cloud Run" on the same trigger —
# it can still overwrite the frontend after this pipeline with the wrong image.

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  automapSubstitutions: true
