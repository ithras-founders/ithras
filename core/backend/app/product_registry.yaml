# Product router registry - defines routers to import and mount per product
products:
  calendar-management:
    - routers: app.modules.scheduling.routers
      modules: [calendar_slots, timetable_blocks, availability]
  cv:
    - routers: app.modules.cv_builder.routers
      modules: [cv_templates, cvs]
  recruitment-university:
    - routers: app.modules.governance.routers
      modules: [policies, workflows, workflow_approvals, workflow_templates, application_requests]
  institution-management:
    - routers: app.modules.institution.routers
      modules: [users, institutions, programs]
  company-management:
    - routers: app.modules.company.routers
      modules: [companies, jobs, jd_submissions, bulk_operations]
  candidates:
    - routers: app.modules.candidates.routers
      modules: [shortlists, applications, offers]
  general-feed:
    - routers: app.modules.feed.routers
      modules: [posts, network]
  recruitment-lateral:
    - routers: app.modules.recruitment.routers
      modules: [ai_shortlist, schedule, job_profiles, discovery, outreach, talent_pools]
  user-management:
    - routers: app.modules.user_management.routers
      modules: [admin, roles]
  database:
    - routers: app.modules.database.routers
      modules: [database]
  migrations:
    - routers: app.modules.migrations.routers
      modules: [migrations]
  testing:
    - routers: app.modules.testing.routers
      modules: [tests]
  simulator:
    - routers: app.modules.simulator.routers
      modules: [simulator]