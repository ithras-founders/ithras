steps:
  # Step 1: Build the frontend Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:$COMMIT_SHA'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:latest'
      - '-f'
      - 'Dockerfile.frontend'
      - '.'

  # Step 2: Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:$COMMIT_SHA'
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:latest'

  # Step 3: Resolve backend URL and deploy frontend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:slim'
    entrypoint: bash
    args:
      - '-c'
      - |
        BACKEND_URL=$$(gcloud run services describe ithras-backend --region europe-west1 --format 'value(status.url)')
        if [ -z "$$BACKEND_URL" ]; then
          echo "ERROR: Could not resolve backend service URL"
          exit 1
        fi
        echo "BACKEND_URL: $$BACKEND_URL"
        gcloud run deploy ithras-frontend \
          --image europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:$COMMIT_SHA \
          --region europe-west1 \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --set-env-vars "BACKEND_URL=$$BACKEND_URL"

images:
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:$COMMIT_SHA'
  - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ithras/ithras-frontend:latest'

options:
  logging: CLOUD_LOGGING_ONLY
